name: Fill CR/Slope (alle banen)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modus'
        required: false
        default: 'fill-all'
        type: choice
        options:
          - fill-all
          - status

jobs:
  fill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install -r scripts/requirements.txt

      - name: Vul CR/slope voor alle banen
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOG_LEVEL:            INFO
        run: python scripts/scrape_cr_slope.py ${{ inputs.mode || 'fill-all' }}
