name: Garmin koppelen

# Getriggerd vanuit de app wanneer een gebruiker Garmin wil koppelen.
# Handelt de interactieve login af (inclusief OTP) via Supabase als brug.
on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID van de gebruiker die koppelt'
        required: true
        type: string

jobs:
  auth:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install -r scripts/requirements.txt

      - name: Garmin koppelen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOLF_USER_ID: ${{ inputs.user_id }}
        run: python scripts/garmin_auth.py
